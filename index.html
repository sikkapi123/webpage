<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLNCE Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f4c81,#1e88e5);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-container{
            width:360px;
            background:#fff;
            padding:40px;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,0.25);
            text-align:center;
        }

        .logo{
            width:120px;
            margin-bottom:20px;
        }

        h2{
            color:#333;
            margin-bottom:25px;
        }

        .input-group{
            margin-bottom:18px;
            text-align:left;
        }

        .input-group label{
            display:block;
            margin-bottom:6px;
            color:#555;
            font-weight:bold;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:15px;
        }

        .input-group input:focus{
            outline:none;
            border-color:#1e88e5;
        }

        .login-btn{
            width:100%;
            padding:12px;
            background:#0f4c81;
            color:white;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            background:#1565c0;
        }

        .forgot-password{
            margin-top:15px;
        }

        .forgot-password a{
            text-decoration:none;
            color:#1e88e5;
            font-size:14px;
        }

        .forgot-password a:hover{
            text-decoration:underline;
        }
    </style>
</head>

<body>
    


    <div class="login-container">

        <!-- KLNCE Logo -->
        <img src="https://www.klnce.edu/reflechir15/klncelogo.gif" alt="KLNCE Logo" class="logo">

        <h2>Login</h2>

        <form action="login.php" method="POST">

            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter Username" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter Password" required>
            </div>

            <button type="submit" class="login-btn">Login</button>

            <div class="forgot-password">
                <a href="#">Forgot Password?</a>
            </div>

        </form>

    </div>

</body>
</html>
